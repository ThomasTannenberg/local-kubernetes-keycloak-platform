traefik:
  deployment:
    replicas: 2

  service:
    enabled: true
    single: true
    spec:
      type: NodePort

  ports:
    web:
      port: 80
      exposedPort: 80
      nodePort: 30080
      expose:
        default: true

    websecure:
      port: 443
      exposedPort: 443
      nodePort: 30443
      expose:
        default: true

  ingressClass:
    enabled: true
    isDefaultClass: true

  providers:
    kubernetesCRD:
      enabled: true
      ingressClass: traefik

    kubernetesIngress:
      enabled: true
      ingressClass: traefik

  logs:
    general:
      level: INFO