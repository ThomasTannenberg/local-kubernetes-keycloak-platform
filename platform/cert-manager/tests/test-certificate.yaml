apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager-test
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-local-certificate
  namespace: cert-manager-test
spec:
  secretName: test-local-tls
  duration: 2160h
  renewBefore: 360h
  commonName: test.local.example
  dnsNames:
    - test.local.example
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
